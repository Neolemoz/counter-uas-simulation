overlay_id: ghost_detections
seed_required: true
scenario_scope: single_target_sensing_realism
launch_args:
  use_noisy_measurement: true
  ghost_detection_prob: 0.20
  ghost_placement_mode: broad
  ghost_offset_xy_min_m: 3.0
