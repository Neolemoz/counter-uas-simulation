# Parameters aligned with gazebo_target_sim / target_sphere.sdf scale (dome km-class, radar at asset).
# Use with: ros2 launch counter_uas bringup.launch.py counter_uas_config:=config_gazebo_counter_uas.yaml
world_sim_node:
  ros__parameters:
    scenario: single

radar_sim_node:
  ros__parameters:
    scenario: single
    radar:
      range: 7000.0
      position_x: 0.0
      position_y: 0.0
      position_z: 0.0
      azimuth_half_deg: 180.0
      elevation_half_deg: 70.0
      detection_probability: 0.97
      seed: -1

camera_sim_node:
  ros__parameters:
    scenario: single
    camera:
      mount_x: 0.0
      mount_y: 0.0
      mount_z: 0.0
      yaw_deg: 180.0
      horizontal_fov_deg: 72.0
      vertical_fov_deg: 50.0
      max_range_m: 8000.0
      detection_probability: 0.9

fusion_node:
  ros__parameters:
    scenario: single
    fusion:
      distance_threshold: 250.0
      radar_weight: 1.15
      camera_weight: 1.0

tracking_node:
  ros__parameters:
    scenario: single
    mahalanobis_gate_threshold: 16.27
    # Gates sized for fast (≳30 m/s LOS) targets at 10 Hz.  With predictive candidate matching
    # the actual residual is on the order of fused-measurement noise (~ m), but we leave
    # generous margin so a single noisy / dropped frame does not kill candidate confirmation.
    candidate_match_gate_m: 8.0
    candidate_predictive_gate: true
    association_gate_m: 12.0
    confirmation_hits: 3
    # The KF velocity often starts at 0 at confirmation; bump the cap so a 35–45 m/s target
    # is not silently rejected by the speed sanity check.
    max_track_speed_mps: 80.0
    max_update_jump_m: 15.0

viz_node:
  ros__parameters:
    scenario: single
    threat:
      medium_distance: 3500.0
      high_distance: 1500.0

threat_assessment_node:
  ros__parameters:
    tracks_topic: /tracks
    high_distance_m: 1500.0
    medium_distance_m: 3500.0

# Guidance / kinematics for a km-scale interceptor.  The default 3 m/s² accel limit suits a
# small lab toy but at vmax≈78 m/s it produces a ~26 s velocity ramp (max_dv = 3 * 0.05 =
# 0.15 m/s per cycle), which makes the interceptor *appear stationary* for the first several
# seconds while the target is racing inbound at 38 m/s — i.e. "the interceptor isn't engaging
# when the attacker enters the outer dome".  Bump to a realistic small-missile envelope (≈3 g
# longitudinal, ≈2.5 rad/s yaw) so the ramp completes inside ~3 s.
interception_logic_node:
  ros__parameters:
    max_acceleration_m_s2: 30.0
    max_turn_rate_rad_s: 2.5
