# Default bringup: Gazebo counter-UAS scale (km-class dome). For ~10 m lab worlds use config_lab_toy.yaml.
world_sim_node:
  ros__parameters:
    scenario: single

radar_sim_node:
  ros__parameters:
    scenario: single
    radar:
      range: 7000.0
      position_x: 0.0
      position_y: 0.0
      position_z: 0.0
      azimuth_half_deg: 180.0
      elevation_half_deg: 70.0
      detection_probability: 0.97
      seed: -1

camera_sim_node:
  ros__parameters:
    scenario: single
    camera:
      mount_x: 0.0
      mount_y: 0.0
      mount_z: 0.0
      yaw_deg: 180.0
      horizontal_fov_deg: 72.0
      vertical_fov_deg: 50.0
      max_range_m: 8000.0
      detection_probability: 0.9

fusion_node:
  ros__parameters:
    scenario: single
    fusion:
      distance_threshold: 250.0
      radar_weight: 1.15
      camera_weight: 1.0

tracking_node:
  ros__parameters:
    scenario: single
    mahalanobis_gate_threshold: 16.27
    # Default bringup is the km-scale Gazebo stack and consumes /tracks/state.
    # Keep the tracker gates aligned with the paired radar/camera cadence so
    # tracks confirm before the interceptor waits forever on an empty stream.
    candidate_match_gate_m: 20.0
    candidate_predictive_gate: true
    association_gate_m: 25.0
    confirmation_hits: 2
    candidate_max_missed_frames: 5
    max_track_speed_mps: 80.0
    max_update_jump_m: 25.0

viz_node:
  ros__parameters:
    scenario: single
    threat:
      medium_distance: 3500.0
      high_distance: 1500.0

threat_assessment_node:
  ros__parameters:
    tracks_topic: /tracks
    high_distance_m: 1500.0
    medium_distance_m: 3500.0
